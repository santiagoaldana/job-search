services:
  - type: web
    name: jobsearch
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobsearch-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ALLOWED_EMAIL
        sync: false
      - key: EVENTBRITE_API_TOKEN
        sync: false
      - key: APIFY_API_KEY
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_TENANT_ID
        sync: false

databases:
  - name: jobsearch-db
    databaseName: jobsearch
    plan: free
