[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && cd web && rm -rf node_modules package-lock.json && npm install --ignore-scripts && npm run build"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
